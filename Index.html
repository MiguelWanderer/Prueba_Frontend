    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Veterinaria</title>
</head>
<body>

    <h1>Registro de Paciente Veterinario</h1>

    <form action="#" method="POST">
  
        <div>
            <label for="nombre-animal">Nombre del animal:</label>
            <input type="text" id="nombre-animal" name="nombre_animal" placeholder="Ej. Rocko" required>
        </div>

        <!-- Estado -->
        <div>
            <label for="estado-animal">Estado de salud:</label>
            <select id="estado-animal" name="estado_animal" required>
                <option value="">Selecciona un estado</option>
                <option value="saludable">Saludable / Control</option>
                <option value="enfermo">Enfermo / En tratamiento</option>
                <option value="urgencia">Urgencia</option>
                <option value="post-operatorio">Post-operatorio</option>
            </select>
        </div>

        <!-- Edad -->
        <div>
            <label for="edad-animal">Edad (en años o meses):</label>
            <input type="text" id="edad-animal" name="edad_animal" placeholder="Ej. 3 años / 5 meses" required>
        </div>

        <!-- Dueño -->
        <div>
            <label for="nombre-dueno">Nombre del dueño:</label>
            <input type="text" id="nombre-dueno" name="nombre_dueno" placeholder="Ej. Juan Pérez" required>
        </div>

        <!-- Botón de Envío -->
        <br>
        <button type="submit">Registrar Mascota</button>
    </form>

</body>
</html>
