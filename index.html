<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Veterinaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Registro de Atención Veterinaria</h1>

    <form id="formMascota">
        <div>
            <label for="nombre">Nombre de la mascota:</label>
            <input type="text" id="nombre" placeholder="Ej. Rocko" required>
        </div>
        <div>
            <label for="especie">Especie:</label>
            <input type="text" id="especie" placeholder="Ej. Perro" required>
        </div>
        <div>
            <label for="propietario">Nombre del dueño:</label>
            <input type="text" id="propietario" placeholder="Ej. Juan Pérez" required>
        </div>
        <div>
            <label for="edad">Edad:</label>
            <input type="number" id="edad" placeholder="Ej. 3" required>
        </div>
        
        <br>
        <button type="button" onclick="registrarMascota()">Registrar Mascota</button>
    </form>

    <div id="mensajeError" style="color: red; margin: 10px 0;"></div>
    
    <div id="estadisticas">
        <h3>Estadísticas</h3>
        <p>Total mascotas: <span id="total">0</span></p>
        <p>Pendientes: <span id="pendientes">0</span></p>
        <p>Atendidas: <span id="atendidas">0</span></p>
    </div>

    <h3>Listado de Pacientes</h3>
    <table border="1">
        <thead>
            <tr>
                <th>Nombre</th><th>Especie</th><th>Propietario</th><th>Edad</th><th>Estado</th><th>Acción</th>
            </tr>
        </thead>
        <tbody id="listaMascotas"></tbody>
    </table>

    <script src="Scripts.js"></script>
</body>
</html>
