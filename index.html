<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Veterinaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Registro de Paciente Veterinario</h1>

    <form action="#" method="POST">
  
        <div>
            <label for="nombreAnimal">Nombre del animal:</label>
            <input type="text" id="nombreAnimal" name="nombre_animal" placeholder="Ej. Rocko" required>
        </div>

        <!-- Estado de salud (pendiente decidir si se mantiene) -->
        <div>
            <label for="estadoAnimal">Estado de salud:</label>
            <select id="estadoAnimal" name="estado_animal" required>
                <option value="">Selecciona un estado</option>
                <option value="saludable">Saludable / Control</option>
                <option value="enfermo">Enfermo / En tratamiento</option>
                <option value="urgencia">Urgencia</option>
                <option value="post-operatorio">Post-operatorio</option>
            </select>
        </div>

        <!-- Edad -->
        <div>
            <label for="edadAnimal">Edad (en años o meses):</label>
            <input type="number" id="edadAnimal" name="edad_animal" placeholder="Ej. 3 años / 5 meses" required>
        </div>

        <!-- Especie -->
        <div>
            <label for="especieAnimal">Especie:</label>
            <input type="text" id="especieAnimal" name="especie_animal" placeholder="Ej. Perro, Gato" required>
        </div>

        <!-- Dueño -->
        <div>
            <label for="nombreDueno">Nombre del dueño:</label>
            <input type="text" id="nombreDueno" name="nombre_dueno" placeholder="Ej. Juan Pérez" required>
        </div>
        <!-- Botón de Envío -->
        <br>
        <button type="submit">Registrar Mascota</button>
    </form>

    <!-- Fuera del form: acá va a pintar JS -->
    <div id="lista-mascotas"></div>
    <div id="estadisticas"></div>
    <div id="mensaje-error"></div>

    <script src="Scripts.js" defer></script>
</body>
</html>
